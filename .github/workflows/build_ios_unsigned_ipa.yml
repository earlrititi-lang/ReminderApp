name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate iOS project files on macOS
        run: flutter create . --platforms=ios

      - name: Build iOS app without code signing
        id: build_ios
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign -v 2>&1 | tee build_ios.log

      - name: Package unsigned IPA for AltStore
        if: steps.build_ios.outcome == 'success'
        run: |
          rm -rf Payload
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          mkdir -p build/ios/ipa
          zip -r build/ios/ipa/reminder_app-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: build_ios.log
          if-no-files-found: error

      - name: Upload IPA artifact
        if: steps.build_ios.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/ipa/reminder_app-unsigned.ipa
          if-no-files-found: error

      - name: Fail workflow if iOS build failed
        if: steps.build_ios.outcome != 'success'
        run: |
          echo "Last 200 lines of build_ios.log:"
          tail -n 200 build_ios.log
          exit 1
